media:
  input: assets
  output: /assets

content:
  - name: posts
    label: Posts
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{primary}.md"
    view:
      fields: [title, date]
    fields:
      - name: layout
        label: Layout
        type: string
        default: post
        required: true

      - name: title
        label: Title
        type: string
        required: true

      - name: date
        label: Date
        type: date
        required: true

      - name: summary
        label: Summary
        type: text
        required: true

      - name: body
        label: Body
        type: rich-text
        required: true
